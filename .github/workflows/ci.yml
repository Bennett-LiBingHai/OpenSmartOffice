name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# 全局配置：所有任务共享的缓存键前缀
env:
  APT_CACHE_KEY: ${{ runner.os }}-apt-v1-${{ hashFiles('.github/workflows/ci.yml') }}
  CMAKE_CACHE_KEY: ${{ runner.os }}-cmake-v1-${{ hashFiles('CMakeLists.txt', '**/*.cpp', '**/*.h') }}

jobs:
  # ================================================================
  # Job 1: 编译 + 单元测试（核心门禁）
  # ================================================================
  build-and-test:
    name: Build & Test (g++-12)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # 缓存1：APT 系统依赖包（所有任务共享）
      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives/
          key: ${{ env.APT_CACHE_KEY }}
          restore-keys: |
            ${{ runner.os }}-apt-v1-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++-12 cmake \
            libxml2-dev libzip-dev \
            libspdlog-dev nlohmann-json3-dev \
            libgtest-dev libcpp-httplib-dev \
            qt6-base-dev libqt6concurrent-dev
          # 清理无用缓存，减少最终缓存体积
          sudo apt-get clean

      # 缓存2：CMake 构建产物（增量编译核心）
      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: build/
          key: ${{ env.CMAKE_CACHE_KEY }}
          restore-keys: |
            ${{ runner.os }}-cmake-v1-

      - name: Configure CMake
        run: cmake -B build -DCMAKE_CXX_COMPILER=g++-12 -DCMAKE_BUILD_TYPE=Debug

      - name: Build project
        run: cmake --build build -j$(nproc)

      - name: Run unit tests
        working-directory: build
        run: ctest --output-on-failure

  # ================================================================
  # Job 2: clang-format 代码格式检查
  # ================================================================
  clang-format:
    name: clang-format-18
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # 共享 APT 缓存
      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives/
          key: ${{ env.APT_CACHE_KEY }}
          restore-keys: |
            ${{ runner.os }}-apt-v1-

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format-18
          sudo apt-get clean

      - name: Check code formatting
        run: |
          find . -path ./build -prune -o \( -name '*.cpp' -o -name '*.h' \) -print \
            | xargs clang-format-18 --dry-run --Werror

  # ================================================================
  # Job 3: clang-tidy 静态代码分析
  # ================================================================
  clang-tidy:
    name: clang-tidy-14
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # 共享 APT 缓存
      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives/
          key: ${{ env.APT_CACHE_KEY }}
          restore-keys: |
            ${{ runner.os }}-apt-v1-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++-12 cmake clang-tidy-14 \
            libxml2-dev libzip-dev \
            libspdlog-dev nlohmann-json3-dev \
            libgtest-dev libcpp-httplib-dev \
            qt6-base-dev libqt6concurrent-dev
          sudo apt-get clean

      # 共享 CMake 构建缓存（复用编译产物，避免重复编译）
      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: build/
          key: ${{ env.CMAKE_CACHE_KEY }}
          restore-keys: |
            ${{ runner.os }}-cmake-v1-

      - name: Configure CMake (with compile_commands.json)
        run: |
          cmake -B build -DCMAKE_CXX_COMPILER=g++-12 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run static analysis
        run: |
          find . -path ./build -prune -o \( -name '*.cpp' \) -print \
            | xargs clang-tidy-14 -p build --quiet --warnings-as-errors=*